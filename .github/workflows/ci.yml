name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Fork kill switch: set repository variable YKT_DISABLE_CI=true to turn all of
# this off in a fork (or just disable Actions in the fork's settings).
jobs:
  test:
    name: build & test (${{ matrix.os }})
    if: ${{ vars.YKT_DISABLE_CI != 'true' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          check-latest: true
      - name: Install PC/SC headers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev
      # piv-go uses cgo on Linux/macOS; Windows is pure syscall.
      - name: Set CGO
        shell: bash
        run: echo "CGO_ENABLED=${{ runner.os == 'Windows' && '0' || '1' }}" >> "$GITHUB_ENV"
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test
        shell: bash
        # The race detector needs cgo; Windows builds are CGO_ENABLED=0 (pure
        # syscall), so run the plain test suite there.
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            go test ./...
          else
            go test -race ./...
          fi

  lint:
    name: lint & format
    if: ${{ vars.YKT_DISABLE_CI != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          check-latest: true
      - run: sudo apt-get update && sudo apt-get install -y libpcsclite-dev
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      # v8 supports golangci-lint v2 (matches .golangci.yml `version: "2"`).
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  secret-scan:
    name: secret scan
    if: ${{ vars.YKT_DISABLE_CI != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      # The gitleaks GitHub Action requires a paid license for org repos; the
      # binary is free (MIT). Build + run it directly.
      - name: gitleaks
        # NB: gitleaks' Go module path is still github.com/zricethezav/... even
        # though the repo moved to github.com/gitleaks.
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          "$(go env GOPATH)/bin/gitleaks" dir . --redact --no-banner
