name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Only contents:write is needed (create tags + releases). No pull-request
# creation — so this works even where the org disallows Actions creating PRs.
permissions:
  contents: write

jobs:
  # Compute the next semver from Conventional Commits and create the tag.
  # Runs only on the canonical repo; never on forks.
  version:
    if: ${{ github.repository == 'RawSocketLabs/ykt' && vars.YKT_DISABLE_CI != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false        # only release when a feat/fix warrants it
          release_branches: main
          tag_prefix: v

  # Build a native binary per OS and publish the GitHub Release. Same run as
  # the tag job, so it doesn't depend on the tag-push event re-triggering.
  binaries:
    needs: version
    if: ${{ needs.version.outputs.tag != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: ykt-linux-amd64
            cgo: '1'
            setup: sudo apt-get update && sudo apt-get install -y libpcsclite-dev
          - os: macos-latest
            asset: ykt-darwin-arm64
            cgo: '1'
            setup: 'true'
          - os: windows-latest
            asset: ykt-windows-amd64.exe
            cgo: '0'
            setup: 'true'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true
      - name: Platform setup
        shell: bash
        run: ${{ matrix.setup }}
      - name: Build
        shell: bash
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          go build -trimpath -ldflags "-s -w -X main.version=${TAG}" -o "${{ matrix.asset }}" ./cmd/ykt
      - name: Checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
