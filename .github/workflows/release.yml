name: Release

on:
  push:
    branches: [main]     # auto-tag from Conventional Commits, then release
    tags: ['v*']         # or release a manually/seed-pushed tag
  workflow_dispatch: {}

# contents:write creates tags + releases (no pull-request creation, so this
# works even where the org disallows Actions creating PRs). id-token:write is the
# OIDC identity for keyless cosign signatures + build provenance;
# attestations:write records the SLSA provenance.
permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # On a push to main (canonical repo only), compute the next semver from
  # Conventional Commits and create the tag. Skipped on tag pushes.
  version:
    if: ${{ github.ref == 'refs/heads/main' && github.repository == 'RawSocketLabs/ykt' && vars.YKT_DISABLE_CI != 'true' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false        # only release when a feat/fix warrants it
          release_branches: main
          tag_prefix: v

  # Build a native binary per OS and publish the Release. Runs when the version
  # job created a tag, or when a v* tag was pushed directly.
  binaries:
    needs: version
    if: ${{ always() && github.repository == 'RawSocketLabs/ykt' && (needs.version.outputs.tag != '' || startsWith(github.ref, 'refs/tags/v')) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: ykt-linux-amd64
            cgo: '1'
            setup: sudo apt-get update && sudo apt-get install -y libpcsclite-dev
          - os: macos-latest
            asset: ykt-darwin-arm64
            cgo: '1'
            setup: 'true'
          - os: windows-latest
            asset: ykt-windows-amd64.exe
            cgo: '0'
            setup: 'true'
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          check-latest: true
      - name: Resolve tag
        shell: bash
        run: echo "TAG=${{ needs.version.outputs.tag || github.ref_name }}" >> "$GITHUB_ENV"
      - name: Platform setup
        shell: bash
        run: ${{ matrix.setup }}
      - name: Build
        shell: bash
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          go build -trimpath -ldflags "-s -w -X main.version=${TAG}" -o "${{ matrix.asset }}" ./cmd/ykt
      - name: Checksum
        shell: bash
        run: |
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          fi
      # Keyless signature (records a public entry in the Sigstore transparency
      # log, tied to this workflow's identity). Verify with:
      #   cosign verify-blob --bundle <asset>.cosign.bundle \
      #     --certificate-identity-regexp 'RawSocketLabs/ykt' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <asset>
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign (keyless)
        shell: bash
        run: cosign sign-blob --yes "${{ matrix.asset }}" --bundle "${{ matrix.asset }}.cosign.bundle"
      # SBOM (best-effort — a syft hiccup must not fail a release).
      - name: SBOM
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          file: ${{ matrix.asset }}
          format: spdx-json
          output-file: ${{ matrix.asset }}.sbom.spdx.json
      # SLSA build provenance, verifiable with `gh attestation verify <asset>`.
      - name: Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ matrix.asset }}
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
            ${{ matrix.asset }}.cosign.bundle
            ${{ matrix.asset }}.sbom.spdx.json
